name: scrape

on:
  schedule:
    # 06:00 in Lisbon is 05:00 or 06:00 UTC depending on DST; GitHub Actions
    # cron has no timezone support, so this fixed UTC time will drift ±1h
    # across the DST transition. Acceptable for a daily job with no hard
    # latency requirement — not worth two seasonal cron entries.
    - cron: "0 6 * * *"
    # Same-day retry, 4 hours later. The idempotent same-day skip
    # (listing_already_captured_today / category_already_captured_today)
    # means this naturally only touches whatever didn't land the first time
    # — no separate retry code needed. A store block-detected on the first
    # run is skipped here rather than retried into it (see scraper/base.py).
    - cron: "0 10 * * *"
  workflow_dispatch: {}

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Generous headroom over the worst observed case (Pingo Doce's category
    # crawl: up to 15 individual product pages x 11 categories, each with a
    # jittered 2-5s+ delay) — without this, GitHub's default 360-minute cap
    # is the only limit, and a hung page.goto(wait_until="networkidle") could
    # occupy the `scrape` concurrency slot for hours, delaying the next run.
    timeout-minutes: 30
    strategy:
      # Each store scrapes in its own parallel job — never parallel *within*
      # a store (single tab per run, enforced inside BaseScraper.run), but
      # stores in parallel at most is exactly what spec §7 allows.
      fail-fast: false
      matrix:
        store: [continente, pingo-doce, auchan]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen

      - run: uv run playwright install --with-deps chromium

      - run: uv run python -m scraper.run --store ${{ matrix.store }} --mode basket
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      # Per spec §10: "scrape.yml: basket + category crawl, all stores."
      - run: uv run python -m scraper.run --store ${{ matrix.store }} --mode category
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
