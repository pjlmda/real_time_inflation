# Category-crawl discovery config (spec §4.6, dynamic/self-healing index).
#
# Continente: category listing pages are directly crawlable (allowed by
# robots.txt) and already curated by the retailer, so a plain URL list is
# enough — one category can span multiple sub-pages (e.g. milk fat-content
# variants), merged into a single category_observations row per day.
#
# Pingo Doce: category *navigation* is entirely disallowed cgid search URLs
# (its own robots.txt), so products are discovered from its product sitemap
# instead (same method used for its fixed-basket curation) and matched by
# either a path prefix or explicit keywords. `exclude_keywords` filters out
# sitemap noise that isn't really this ECOICOP category (e.g. flavored milk,
# chocolate "eggs", quail eggs) — the sitemap has no category structure of
# its own, so this filtering is inherently approximate; the point of the
# category-average index is to be a robustness check, not pixel-perfect.

continente:
  "01.1.1.3": # Bread and cereals -> Bread
    urls:
      - https://www.continente.pt/frescos/padaria-e-pastelaria/pao-de-forma-e-embalado/
  "01.1.1.6": # Bread and cereals -> Pasta products and couscous
    urls:
      - https://www.continente.pt/mercearia/arroz-massa-e-farinha/massa/
  "01.1.4.1": # Milk, cheese and eggs -> Fresh milk
    urls:
      - https://www.continente.pt/laticinios-e-ovos/leite/meio-gordo/
      - https://www.continente.pt/laticinios-e-ovos/leite/magro/
      - https://www.continente.pt/laticinios-e-ovos/leite/inteiro/
  "01.1.4.7": # Milk, cheese and eggs -> Eggs
    urls:
      - https://www.continente.pt/laticinios-e-ovos/ovos/
  "01.1.5.3": # Oils and fats -> Olive oil
    urls:
      - https://www.continente.pt/mercearia/azeite-oleo-e-vinagre/azeite/
  "01.1.1.1": # Bread and cereals -> Rice
    urls:
      - https://www.continente.pt/mercearia/arroz-massa-e-farinha/arroz/
  "01.1.4.5": # Milk, cheese and eggs -> Cheese and curd
    urls:
      - https://www.continente.pt/frescos/queijos/fatiado-e-bolas/
  "01.1.2.4": # Meat -> Poultry
    urls:
      - https://www.continente.pt/frescos/talho/frango-e-peru/
  "01.1.3.6": # Fish and seafood -> Preserved/processed fish (canned)
    urls:
      - https://www.continente.pt/mercearia/conservas/atum/
  "02.1.2.1": # Alcoholic beverages -> Wine from grapes
    urls:
      - https://www.continente.pt/bebidas-e-garrafeira/vinhos/vinho-tinto/
  "12.1.3.2": # Personal care articles and products
    urls:
      - https://www.continente.pt/beleza-e-higiene/corpo/sabonetes/
  "01.1.1.2": # Bread and cereals -> Flours and other cereals
    urls:
      - https://www.continente.pt/mercearia/arroz-massa-e-farinha/farinha-e-pao-ralado/
  "01.1.2.1": # Meat -> Beef and veal
    urls:
      - https://www.continente.pt/frescos/talho/novilho-vitela-e-vitelao/
  "01.1.2.2": # Meat -> Pork
    urls:
      - https://www.continente.pt/frescos/talho/porco/
  "01.1.3.1": # Fish and seafood -> Fresh or chilled fish
    urls:
      - https://www.continente.pt/frescos/peixaria/peixe-fresco/
  "01.1.3.5": # Fish and seafood -> Dried, smoked or salted fish (bacalhau)
    urls:
      - https://www.continente.pt/frescos/peixaria/bacalhau/
  "01.1.4.4": # Milk, cheese and eggs -> Yoghurt
    urls:
      - https://www.continente.pt/laticinios-e-ovos/iogurtes/
  "01.1.6.1": # Fruit
    urls:
      - https://www.continente.pt/frescos/frutas/
  "01.1.7.1": # Vegetables
    urls:
      - https://www.continente.pt/frescos/legumes/

pingo-doce:
  "01.1.1.3":
    path_prefix: "/padaria-e-pastelaria/pao-embalado/pao-de-forma-e-embalado/"
  "01.1.1.6":
    path_prefix: "/mercearia/arroz-massa-e-leguminosas/massa/"
  "01.1.4.1":
    path_prefix: "/leite-e-bebidas-vegetais%E2%80%8B/leite/"
    exclude_keywords: ["achocolatado", "aromatizado"]
  "01.1.4.7":
    keywords: ["ovos-de-solo", "ovos-de-ar-livre", "ovos-classe"]
    exclude_keywords: ["chocolate", "codorniz", "moles", "kinder", "milka"]
  "01.1.5.3":
    path_prefix: "/mercearia/azeite-oleo-e-vinagre/azeite/"
  "01.1.1.1":
    path_prefix: "/mercearia/arroz-massa-e-leguminosas/arroz/"
  "01.1.4.5":
    path_prefix: "/charcutaria-e-queijos/queijos/"
  "01.1.2.4":
    path_prefix: "/talho/aves/frango/"
  "01.1.3.6":
    path_prefix: "/mercearia/conservas/atum/"
  "02.1.2.1":
    path_prefix: "/vinhos/vinho-tinto/"
  "12.1.3.2":
    path_prefix: "/higiene-pessoal-e-beleza/corpo/sabonetes/"
  "01.1.1.2":
    path_prefix: "/mercearia/farinha-fermento-e-acucar/farinha-fermento-e-pao-ralado/"
    # NOTE: exclude_keywords must not be substrings of path_prefix itself
    # (e.g. "pao-ralado" or "acucar" would exclude every URL under this
    # path, since they're literal folder-name segments, not just possible
    # product-slug words) — real bug hit and fixed during basket growth
    # round 3, see seed/README.md.
    exclude_keywords: ["fermento-em-po", "bicarbonato"]
  "01.1.2.1":
    path_prefix: "/talho/vitela-vitelao-e-bovino/"
  "01.1.2.2":
    path_prefix: "/talho/porco/"
  "01.1.3.1":
    path_prefix: "/peixaria/peixe/"
  "01.1.3.5":
    path_prefix: "/peixaria/bacalhau/bacalhau-salgado-seco/"
  "01.1.4.4":
    path_prefix: "/iogurtes-e-sobremesas/iogurtes/iogurtes-naturais"
  "01.1.6.1":
    path_prefix: "/frutas-e-vegetais/frutas/"
  "01.1.7.1":
    path_prefix: "/frutas-e-vegetais/vegetais/"

