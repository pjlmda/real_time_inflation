name: compute

on:
  workflow_run:
    workflows: [scrape]
    types: [completed]
  workflow_dispatch: {}

concurrency:
  group: compute
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    # No browser involved (Supabase reads/writes only) — a normal run takes
    # seconds; this is just a cap against a hung request or infinite retry.
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - run: uv sync --frozen

      - run: uv run python -m metrics.compute
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
